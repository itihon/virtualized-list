<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Scrollable Container</title>
  </head>
  <body>
    <script type="module">
      import ScrollableContainer from '../../src/ScrollableContainer/ScrollableContainer.ts';
      import EventBus from '../../src/EventBus/EventBus.ts';

      const container = document.createElement('div');
      const nonVirtualizedContainer = document.createElement('div');
      const eventBus = new EventBus();
      const scrollableContainer = new ScrollableContainer(container, eventBus);

      function createItem(content = '') {
        const item = document.createElement('div');

        item.style.height = '20px';
        item.style.outline = '1px solid royalblue';
        item.textContent = content;

        return item;
      }

      container.style.width = '100px';
      container.style.height = '150px';
      container.style.position = 'relative';

      nonVirtualizedContainer.style.width = '100px';
      nonVirtualizedContainer.style.height = '150px';
      nonVirtualizedContainer.style.position = 'relative';
      nonVirtualizedContainer.style.overflowY = 'auto';
      nonVirtualizedContainer.style.marginTop = '16px';

      scrollableContainer.setScrollHeight(200000);

      for (let i = 0; i < 10000; i++) {
        scrollableContainer.appendItem(createItem(`Item ${i}.`));
        nonVirtualizedContainer.appendChild(createItem(`Item ${i}.`));
      }

      eventBus.on('onScroll', (position) => {
        // new IntersectionObserver((_, observer) => {
          scrollableContainer.updateContentPosition(position);
          // observer.unobserve(container);
        // }).observe(container);
      });

      window.scrollableContainer = scrollableContainer;
      window.eventBus = eventBus;
      document.body.appendChild(container);
      document.body.appendChild(nonVirtualizedContainer);
    </script>
  </body>
</html>
