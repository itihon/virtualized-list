<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Scrollable Container</title>
    <style>
      .scrollableContainer {
        width: 100px;
        height: 150px;
        position: relative;
      }

      .contentLayer {
        outline: 2px solid red;
      }

      .listItem {
        outline: 1px solid royalblue;
      }

      .nonVirtualizedContainer {
        width: 100px;
        height: 150px;
        position: relative;
        overflow-y: auto;
        margin-top: 16px;
      }
    </style>
  </head>
  <body>
    <script type="module">
      import ScrollableContainer from '../../src/ScrollableContainer/ScrollableContainer.ts';
      import EventBus from '../../src/EventBus/EventBus.ts';

      const container = document.createElement('div');
      const nonVirtualizedContainer = document.createElement('div');
      const eventBus = new EventBus();
      const scrollableContainer = new ScrollableContainer(container, eventBus);
      const itemHeight = 40;
      const itemsCount = 10000;
      const scrollHeight = itemHeight * itemsCount;

      function renderItem(content = '', offsetTop = 0) {
        const item = document.createElement('div');

        item.textContent = content;
        item.style.position = 'absolute';
        item.style.width = '100%';
        item.style.top = `${offsetTop}px`;
        item.style.height = `${itemHeight}px`;
        item.classList.add('listItem');

        return item;
      }

      nonVirtualizedContainer.classList.add('nonVirtualizedContainer');

      scrollableContainer.setScrollHeight(scrollHeight);

      for (let i = 0; i < itemsCount; i++) {
      //   scrollableContainer.appendItem(createItem(`Item ${i}.`));
        nonVirtualizedContainer.appendChild(renderItem(`Item ${i}.`, i * itemHeight));
      }

      eventBus.on('onScroll', (position) => {
        scrollableContainer.clear();

        const startIndex = Math.floor(position / itemHeight);
        const endIndex = Math.min(Math.ceil(startIndex + (scrollableContainer.getClientHeight() / itemHeight)), itemsCount - 1);

        for (let idx = startIndex, i = 0; idx <= endIndex; idx++, i++) {
          scrollableContainer.appendItem(renderItem(`Item ${idx}.`, i * itemHeight));
        }

        // scrollableContainer.updateContentPosition(position);
      });

      window.scrollableContainer = scrollableContainer;
      window.eventBus = eventBus;
      document.body.appendChild(container);
      document.body.appendChild(nonVirtualizedContainer);
    </script>
  </body>
</html>
